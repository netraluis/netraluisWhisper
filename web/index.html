<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>netraluisWhisper</title>
    <style>
      :root {
        --bg: #0f1012; --panel: #17181c; --line: #26282e; --fg: #eaeaec;
        --muted: #8b8d94; --accent: #ff453a; --accent2: #4f8cff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; background: var(--bg); color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }
      header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 18px 24px; border-bottom: 1px solid var(--line);
        position: sticky; top: 0; background: var(--bg); z-index: 5;
      }
      header h1 { font-size: 17px; margin: 0; font-weight: 600; }
      header .dot { color: var(--accent); }
      .wrap { max-width: 820px; margin: 0 auto; padding: 24px; }
      .panel {
        background: var(--panel); border: 1px solid var(--line);
        border-radius: 12px; padding: 18px; margin-bottom: 22px;
      }
      .panel h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .05em;
        color: var(--muted); margin: 0 0 14px; }
      .row { display: flex; gap: 14px; flex-wrap: wrap; }
      .field { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 160px; }
      .field label { font-size: 12px; color: var(--muted); }
      select {
        background: #101114; color: var(--fg); border: 1px solid var(--line);
        border-radius: 8px; padding: 9px 10px; font-size: 14px; width: 100%;
      }
      select:disabled { opacity: .5; }
      .keywarn { font-size: 12px; color: var(--accent); margin-top: 8px; min-height: 16px; }
      .saved { font-size: 12px; color: #37c871; margin-top: 8px; min-height: 16px; }
      .stats { display: flex; gap: 26px; flex-wrap: wrap; }
      .stat .n { font-size: 22px; font-weight: 700; }
      .stat .l { font-size: 12px; color: var(--muted); }
      .list-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
      .list-head h2 { margin: 0; }
      .btn {
        background: #202228; color: var(--fg); border: 1px solid var(--line);
        border-radius: 7px; padding: 6px 11px; font-size: 12px; cursor: pointer;
      }
      .btn:hover { border-color: #3a3d45; }
      .btn.danger:hover { border-color: var(--accent); color: var(--accent); }
      .entry {
        border: 1px solid var(--line); border-radius: 10px; padding: 13px 15px;
        margin-bottom: 10px; background: #131418;
      }
      .entry .text { font-size: 15px; margin-bottom: 8px; white-space: pre-wrap; }
      .entry .meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
        font-size: 12px; color: var(--muted); }
      .entry .meta .tag { background: #1d1f25; border: 1px solid var(--line);
        padding: 2px 8px; border-radius: 6px; }
      .entry .actions { margin-left: auto; display: flex; gap: 8px; }
      .empty { color: var(--muted); text-align: center; padding: 40px 0; }
      .toast {
        position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
        background: #202228; border: 1px solid var(--line); color: var(--fg);
        padding: 10px 16px; border-radius: 10px; font-size: 13px; opacity: 0;
        transition: opacity .2s; pointer-events: none;
      }
      .toast.show { opacity: 1; }
    </style>
  </head>
  <body>
    <header>
      <h1><span class="dot">●</span> netraluisWhisper</h1>
      <button class="btn" onclick="loadAll()">Refrescar</button>
    </header>

    <div class="wrap">
      <div class="panel">
        <h2>Modelo de transcripción</h2>
        <div class="row">
          <div class="field">
            <label>Proveedor</label>
            <select id="provider"></select>
          </div>
          <div class="field">
            <label>Modelo</label>
            <select id="model"></select>
          </div>
          <div class="field">
            <label>Idioma</label>
            <select id="language">
              <option value="es">Español</option>
              <option value="en">English</option>
              <option value="ca">Català</option>
              <option value="fr">Français</option>
              <option value="de">Deutsch</option>
              <option value="it">Italiano</option>
              <option value="pt">Português</option>
            </select>
          </div>
        </div>
        <div class="keywarn" id="keywarn"></div>
        <div class="saved" id="saved"></div>
      </div>

      <div class="panel">
        <h2>Insight</h2>
        <div class="stats">
          <div class="stat"><div class="n" id="s-count">0</div><div class="l">transcripciones</div></div>
          <div class="stat"><div class="n" id="s-words">0</div><div class="l">palabras dictadas</div></div>
          <div class="stat"><div class="n" id="s-today">0</div><div class="l">hoy</div></div>
          <div class="stat"><div class="n" id="s-app">—</div><div class="l">app más usada</div></div>
        </div>
      </div>

      <div class="panel">
        <div class="list-head">
          <h2>Historial</h2>
          <button class="btn danger" onclick="clearHistory()">Vaciar</button>
        </div>
        <div id="history"></div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      let providers = {}

      function toast(msg) {
        const t = document.getElementById('toast')
        t.textContent = msg
        t.classList.add('show')
        setTimeout(() => t.classList.remove('show'), 1400)
      }

      async function loadSettings() {
        const res = await fetch('/api/settings')
        const { settings, providers: provs } = await res.json()
        providers = provs
        const provSel = document.getElementById('provider')
        provSel.innerHTML = Object.keys(provs)
          .map((p) => `<option value="${p}">${p}</option>`)
          .join('')
        provSel.value = settings.provider
        fillModels(settings.provider, settings.model)
        document.getElementById('language').value = settings.language
        updateKeyWarn(settings.provider)
      }

      function fillModels(provider, selected) {
        const models = (providers[provider] || {}).models || []
        const sel = document.getElementById('model')
        sel.innerHTML = models.map((m) => `<option value="${m}">${m}</option>`).join('')
        if (selected && models.includes(selected)) sel.value = selected
      }

      function updateKeyWarn(provider) {
        const w = document.getElementById('keywarn')
        const present = (providers[provider] || {}).keyPresent
        w.textContent = present ? '' : `Falta la API key de ${provider} en tu .env`
      }

      async function saveSettings() {
        const provider = document.getElementById('provider').value
        const model = document.getElementById('model').value
        const language = document.getElementById('language').value
        await fetch('/api/settings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ provider, model, language }),
        })
        const s = document.getElementById('saved')
        s.textContent = 'Guardado ✓'
        setTimeout(() => (s.textContent = ''), 1500)
      }

      document.getElementById('provider').addEventListener('change', (e) => {
        fillModels(e.target.value)
        updateKeyWarn(e.target.value)
        saveSettings()
      })
      document.getElementById('model').addEventListener('change', saveSettings)
      document.getElementById('language').addEventListener('change', saveSettings)

      function fmtTime(ts) {
        const d = new Date(ts)
        return d.toLocaleString()
      }

      async function loadHistory() {
        const res = await fetch('/api/history')
        const items = await res.json()
        renderStats(items)
        const box = document.getElementById('history')
        if (!items.length) {
          box.innerHTML = '<div class="empty">Aún no hay transcripciones. Mantén Right-Cmd y habla.</div>'
          return
        }
        box.innerHTML = items
          .map(
            (e) => `
          <div class="entry">
            <div class="text">${escapeHtml(e.text)}</div>
            <div class="meta">
              <span>${fmtTime(e.ts)}</span>
              <span class="tag">${e.provider} · ${e.model}</span>
              ${e.appName ? `<span class="tag">${escapeHtml(e.appName)}</span>` : ''}
              <span>${(e.ms / 1000).toFixed(1)}s</span>
              <div class="actions">
                <button class="btn" onclick='copyText(${JSON.stringify(e.text)})'>Copiar</button>
                <button class="btn" onclick='repaste(${JSON.stringify(e.text)})'>Re-pegar</button>
              </div>
            </div>
          </div>`
          )
          .join('')
      }

      function renderStats(items) {
        const count = items.length
        const words = items.reduce((a, e) => a + (e.text.trim().split(/\s+/).filter(Boolean).length), 0)
        const startOfDay = new Date(); startOfDay.setHours(0, 0, 0, 0)
        const today = items.filter((e) => e.ts >= startOfDay.getTime()).length
        const appCounts = {}
        items.forEach((e) => { if (e.appName) appCounts[e.appName] = (appCounts[e.appName] || 0) + 1 })
        const topApp = Object.entries(appCounts).sort((a, b) => b[1] - a[1])[0]
        document.getElementById('s-count').textContent = count
        document.getElementById('s-words').textContent = words
        document.getElementById('s-today').textContent = today
        document.getElementById('s-app').textContent = topApp ? topApp[0] : '—'
      }

      async function copyText(text) {
        await navigator.clipboard.writeText(text)
        toast('Copiado')
      }

      async function repaste(text) {
        await fetch('/api/repaste', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        })
        toast('Cambia a tu app… pego en 2s')
      }

      async function clearHistory() {
        if (!confirm('¿Vaciar todo el historial?')) return
        await fetch('/api/history', { method: 'DELETE' })
        loadHistory()
      }

      function escapeHtml(s) {
        return s.replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]))
      }

      function loadAll() { loadSettings(); loadHistory() }
      loadAll()
      setInterval(loadHistory, 4000) // live-ish refresh
    </script>
  </body>
</html>
