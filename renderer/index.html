<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>netraluisWhisper</title>
    <style>
      /* The OPAQUE window itself is the pill (backgroundColor #141416 in main).
         The body fills it; the window's rounded corners give the pill shape. */
      html, body {
        margin: 0;
        height: 100%;
        background: transparent;
        overflow: hidden;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 13px;
        font-weight: 500;
        -webkit-user-select: none;
        cursor: default;
      }
      #bar {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 0 18px;
        box-sizing: border-box;
      }
      #dot { width: 10px; height: 10px; border-radius: 50%; flex: none; background: #666; }
      /* recording: pulsing red */
      body.recording #dot { background: #ff453a; animation: pulse 1s infinite; }
      /* transcribing: spinner */
      body.transcribing #dot {
        background: transparent;
        border: 2px solid rgba(255,255,255,0.25);
        border-top-color: #fff;
        animation: spin 0.7s linear infinite;
      }
      body.done #dot { background: #F4B860; }
      body.error #dot { background: #ff453a; }
      @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="bar"><span id="dot"></span><span id="label"></span></div>
    <script src="./recorder.js"></script>
    <script>
      // IIFE so our `const`s don't collide with recorder.js's top-level
      // `const { ipcRenderer }` — classic scripts share one global scope, and a
      // redeclaration would throw a SyntaxError that silently kills this whole
      // script (which is what stopped the overlay from ever showing a state).
      (function () {
        const { ipcRenderer } = require('electron')
        const label = document.getElementById('label')
        ipcRenderer.on('state', (_e, state, msg) => {
          document.body.className = state
          if (state === 'recording') label.textContent = 'Escuchando…'
          else if (state === 'transcribing') label.textContent = 'Convirtiendo tu voz…'
          else if (state === 'done') label.textContent = 'Pegado ✓'
          else if (state === 'error') label.textContent = msg || 'Error'
          else label.textContent = ''
        })
      })()
    </script>
  </body>
</html>
