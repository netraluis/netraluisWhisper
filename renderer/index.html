<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>netraluisWhisper</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-user-select: none;
        cursor: default;
      }
      #pill {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 12px auto;
        width: fit-content;
        max-width: 216px;
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(20, 20, 22, 0.92);
        color: #fff;
        font-size: 13px;
        font-weight: 500;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(12px);
      }
      #dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex: none;
      }
      /* recording: pulsing red */
      body.recording #dot { background: #ff453a; animation: pulse 1s infinite; }
      /* transcribing: spinner */
      body.transcribing #dot {
        background: transparent;
        border: 2px solid rgba(255,255,255,0.25);
        border-top-color: #fff;
        animation: spin 0.7s linear infinite;
      }
      /* done: solid sand dot (label carries the ✓) */
      body.done #dot { background: #F4B860; }
      /* error: solid red dot + message */
      body.error #dot { background: #ff453a; }
      body.error #pill { max-width: 280px; }
      @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="pill"><span id="dot"></span><span id="label">Escuchando…</span></div>
    <script src="./recorder.js"></script>
    <script>
      const { ipcRenderer } = require('electron')
      const label = document.getElementById('label')
      ipcRenderer.on('state', (_e, state, msg) => {
        document.body.className = state
        if (state === 'recording') label.textContent = 'Escuchando…'
        else if (state === 'transcribing') label.textContent = 'Convirtiendo tu voz…'
        else if (state === 'done') label.textContent = 'Pegado ✓'
        else if (state === 'error') label.textContent = msg || 'Error'
      })
    </script>
  </body>
</html>
